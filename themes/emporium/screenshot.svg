<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" role="img" aria-label="Emporium storefront theme preview">
  <defs>
    <linearGradient id="e-hero" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#e8ddcb"/><stop offset="0.6" stop-color="#cdb196"/><stop offset="1" stop-color="#b89b78"/></linearGradient>
    <linearGradient id="e-living" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#f3e0cf"/><stop offset="1" stop-color="#e3bd97"/></linearGradient>
    <linearGradient id="e-kitchen" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#cfeee3"/><stop offset="1" stop-color="#9bd8c2"/></linearGradient>
    <linearGradient id="e-light" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#f4ead0"/><stop offset="1" stop-color="#e6cf94"/></linearGradient>
    <linearGradient id="e-acc" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#e2d6f3"/><stop offset="1" stop-color="#c3aae8"/></linearGradient>
    <filter id="e-shadow" x="-20%" y="-20%" width="140%" height="160%"><feDropShadow dx="0" dy="16" stdDeviation="22" flood-color="#2a2418" flood-opacity="0.22"/></filter>
    <filter id="e-card" x="-20%" y="-20%" width="140%" height="160%"><feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#2a2418" flood-opacity="0.14"/></filter>
  </defs>

  <!-- Page -->
  <rect width="1200" height="900" fill="#faf8f3"/>

  <!-- Announcement bar -->
  <rect x="0" y="0" width="1200" height="34" fill="#16150f"/>
  <text x="600" y="22" font-family="system-ui, sans-serif" font-size="13" fill="#f3efe6" text-anchor="middle">Free shipping on every order this week — shop new arrivals</text>

  <!-- Header -->
  <rect x="0" y="34" width="1200" height="74" fill="#faf8f3"/>
  <line x1="0" y1="108" x2="1200" y2="108" stroke="#e7e2d7" stroke-width="1.5"/>
  <text x="64" y="80" font-family="Georgia, serif" font-size="27" font-weight="600" fill="#16150f">Maison&#160;Verre</text>
  <g font-family="system-ui, sans-serif" font-size="15" fill="#16150f">
    <text x="470" y="79">Shop</text><text x="556" y="79">Living</text><text x="652" y="79">Kitchen</text><text x="766" y="79">Journal</text>
  </g>
  <!-- search / wishlist / cart -->
  <g transform="translate(1012,60)" fill="none" stroke="#16150f" stroke-width="1.8"><circle cx="9" cy="9" r="6"/><line x1="13.5" y1="13.5" x2="19" y2="19" stroke-linecap="round"/></g>
  <g transform="translate(1058,58)" fill="none" stroke="#16150f" stroke-width="1.6"><path d="M11 19s-7-4.3-9.3-8.6C0 7.7 1.6 4.4 4.8 3.9c1.9-.3 3.6.8 4.6 2.3 1-1.5 2.7-2.6 4.6-2.3 3.2.5 4.8 3.8 2.8 6.5C18 14.7 11 19 11 19z"/></g>
  <g transform="translate(1108,58)" fill="none" stroke="#16150f" stroke-width="1.7"><circle cx="6" cy="20" r="1.5"/><circle cx="17" cy="20" r="1.5"/><path d="M0 1h3l2.4 12h11l2.6-8H5"/></g>
  <circle cx="1132" cy="56" r="10" fill="#16150f"/>
  <text x="1132" y="60" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">3</text>

  <!-- Hero -->
  <text x="64" y="200" font-family="system-ui, sans-serif" font-size="13" font-weight="700" letter-spacing="2" fill="#1f5d44">NEW SEASON</text>
  <text x="64" y="262" font-family="Georgia, serif" font-size="58" font-weight="600" fill="#16150f">Things worth</text>
  <text x="64" y="324" font-family="Georgia, serif" font-size="58" font-weight="600" fill="#16150f">keeping.</text>
  <text x="64" y="372" font-family="system-ui, sans-serif" font-size="17" fill="#56524a">A small, considered collection for the home —</text>
  <text x="64" y="398" font-family="system-ui, sans-serif" font-size="17" fill="#56524a">made well, priced fairly, and shipped free.</text>
  <rect x="64" y="430" width="210" height="52" rx="26" fill="#16150f"/>
  <text x="169" y="463" font-family="system-ui, sans-serif" font-size="15" font-weight="600" fill="#fff" text-anchor="middle">Shop the collection</text>
  <rect x="288" y="430" width="150" height="52" rx="26" fill="none" stroke="#16150f" stroke-width="1.5"/>
  <text x="363" y="463" font-family="system-ui, sans-serif" font-size="15" font-weight="600" fill="#16150f" text-anchor="middle">Browse Living</text>

  <!-- Hero art -->
  <g filter="url(#e-shadow)"><rect x="640" y="150" width="496" height="372" rx="22" fill="url(#e-hero)"/></g>
  <g transform="translate(810,250)" fill="none" stroke="#6b5638" stroke-width="1.6" opacity="0.5"><path d="M0 30l6 42a6 6 0 006 5h48a6 6 0 006-5l6-42M0 30h72M0 30l12-20h48l12 20M24 46a12 12 0 0024 0" transform="scale(2)"/></g>
  <g filter="url(#e-card)"><rect x="668" y="448" width="172" height="56" rx="12" fill="#ffffff"/></g>
  <text x="686" y="472" font-family="system-ui, sans-serif" font-size="12" fill="#8b867b">Best seller</text>
  <text x="686" y="492" font-family="Georgia, serif" font-size="16" font-weight="600" fill="#16150f">Boucle Chair</text>

  <!-- Trust strip -->
  <line x1="64" y1="560" x2="1136" y2="560" stroke="#e7e2d7" stroke-width="1.5"/>
  <g font-family="system-ui, sans-serif" font-size="14" fill="#56524a">
    <text x="150" y="600" text-anchor="middle">✓ Free shipping $50+</text>
    <text x="420" y="600" text-anchor="middle">✓ 30-day returns</text>
    <text x="690" y="600" text-anchor="middle">✓ Secure checkout</text>
    <text x="980" y="600" text-anchor="middle">★ 4.8/5 · 2,400 reviews</text>
  </g>
  <line x1="64" y1="624" x2="1136" y2="624" stroke="#e7e2d7" stroke-width="1.5"/>

  <!-- New arrivals heading -->
  <text x="64" y="678" font-family="system-ui, sans-serif" font-size="12" font-weight="700" letter-spacing="2" fill="#1f5d44">JUST IN</text>
  <text x="64" y="712" font-family="Georgia, serif" font-size="30" font-weight="600" fill="#16150f">New arrivals</text>
  <text x="1136" y="708" font-family="system-ui, sans-serif" font-size="15" font-weight="600" fill="#16150f" text-anchor="end">Shop all →</text>

  <!-- Product row -->
  <g filter="url(#e-card)"><rect x="64" y="736" width="252" height="150" rx="14" fill="#ffffff"/></g>
  <rect x="64" y="736" width="252" height="150" rx="14" fill="url(#e-living)"/>
  <rect x="80" y="752" width="50" height="22" rx="11" fill="#b23a2e"/>
  <text x="105" y="768" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">-25%</text>

  <g filter="url(#e-card)"><rect x="338" y="736" width="252" height="150" rx="14" fill="#ffffff"/></g>
  <rect x="338" y="736" width="252" height="150" rx="14" fill="url(#e-kitchen)"/>

  <g filter="url(#e-card)"><rect x="612" y="736" width="252" height="150" rx="14" fill="#ffffff"/></g>
  <rect x="612" y="736" width="252" height="150" rx="14" fill="url(#e-light)"/>

  <g filter="url(#e-card)"><rect x="886" y="736" width="250" height="150" rx="14" fill="#ffffff"/></g>
  <rect x="886" y="736" width="250" height="150" rx="14" fill="url(#e-acc)"/>
</svg>
