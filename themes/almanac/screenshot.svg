<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <linearGradient id="cover" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#cfe4dc"/>
      <stop offset="0.5" stop-color="#9ec7b9"/>
      <stop offset="1" stop-color="#6fa394"/>
    </linearGradient>
    <linearGradient id="thumb" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d8e6df"/>
      <stop offset="1" stop-color="#9cc0b0"/>
    </linearGradient>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse" patternTransform="translate(-13 -13)">
      <circle cx="13" cy="13" r="1.1" fill="#232a2b" opacity="0.07"/>
    </pattern>
  </defs>

  <!-- Paper + dot grid -->
  <rect width="1200" height="900" fill="#f4f1e9"/>
  <rect width="1200" height="900" fill="url(#dots)"/>

  <!-- Header -->
  <rect x="0" y="0" width="1200" height="104" fill="#fbf9f3"/>
  <line x1="0" y1="104" x2="1200" y2="104" stroke="#ddd6c6" stroke-width="2"/>
  <!-- Leaf mark -->
  <g transform="translate(80 36)" stroke="#2f7d6e" fill="#2f7d6e">
    <path d="M16 32 C16 23 16 16 16 11" stroke-width="2.4" stroke-linecap="round" fill="none"/>
    <path d="M16 19 C10 19 6 16 5 10 C12 9 16 12 17 18" opacity="0.85" stroke="none"/>
    <path d="M16 15 C22 15 26 12 27 7 C20 6 16 9 15 14" opacity="0.55" stroke="none"/>
  </g>
  <text x="128" y="58" font-size="32" font-weight="600" fill="#232a2b" letter-spacing="-0.6">Fieldnotes</text>
  <text x="128" y="82" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#79827f">A garden of working notes.</text>
  <g font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="600">
    <text x="812" y="62" fill="#2f7d6e">Home</text>
    <text x="892" y="62" fill="#4d5658">Notes</text>
    <text x="972" y="62" fill="#4d5658">Tags</text>
    <text x="1042" y="62" fill="#4d5658">About</text>
  </g>

  <!-- Garden intro -->
  <line x1="80" y1="158" x2="106" y2="158" stroke="#7fb3a6" stroke-width="1"/>
  <text x="116" y="163" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" letter-spacing="2.5" fill="#2f7d6e">A DIGITAL GARDEN</text>
  <text x="80" y="212" font-size="40" font-weight="600" fill="#232a2b" letter-spacing="-0.8">Notes I tend in the open —</text>
  <text x="80" y="258" font-size="40" font-weight="600" fill="#232a2b" letter-spacing="-0.8">interlinked and always growing.</text>
  <!-- Vine sprout flourish -->
  <g transform="translate(636 226)" stroke="#2f7d6e" fill="none" stroke-width="2.4" stroke-linecap="round">
    <path d="M6 30 C6 20 8 12 14 6"/>
    <path d="M14 7 C22 4 32 7 38 12 C30 13 22 12 15 16" stroke-linejoin="round"/>
  </g>

  <line x1="80" y1="296" x2="1120" y2="296" stroke="#ddd6c6" stroke-width="1" stroke-dasharray="5 5"/>

  <!-- SEEDLING (lead) -->
  <!-- Cover image -->
  <rect x="80" y="332" width="500" height="392" rx="14" fill="url(#cover)"/>
  <circle cx="170" cy="420" r="58" fill="#ffffff" opacity="0.16"/>
  <circle cx="460" cy="650" r="84" fill="#245f54" opacity="0.14"/>
  <text x="290" y="560" font-size="120" font-weight="600" fill="#245f54" opacity="0.42" text-anchor="middle">F</text>

  <!-- Seedling body -->
  <g>
    <rect x="624" y="340" width="190" height="28" rx="14" fill="#eef5f2" stroke="#dbe9e4" stroke-width="1"/>
    <text x="642" y="359" font-family="Arial, Helvetica, sans-serif" font-size="12.5" font-weight="700" letter-spacing="1.4" fill="#2f7d6e">SECOND BRAIN</text>

    <!-- Tended stamps -->
    <circle cx="832" cy="354" r="4" fill="#b06a2c"/>
    <text x="844" y="359" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#79827f">Planted Jun 4</text>
    <circle cx="958" cy="354" r="4" fill="#2f7d6e"/>
    <text x="970" y="359" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#79827f">Last tended Jun 19</text>

    <text x="624" y="420" font-size="40" font-weight="600" fill="#232a2b" letter-spacing="-0.6">Notes that link to</text>
    <text x="624" y="466" font-size="40" font-weight="600" fill="#232a2b" letter-spacing="-0.6">other notes</text>

    <g font-size="21" fill="#4d5658" font-family="Georgia, serif">
      <text x="624" y="524">A note is only as alive as the threads</text>
      <text x="624" y="554">leaving it. Tend the links, and the</text>
      <text x="624" y="584">garden starts thinking for you.</text>
    </g>

    <!-- Tag row -->
    <g font-family="ui-monospace, Menlo, Consolas, monospace" font-size="13">
      <rect x="624" y="614" width="118" height="28" rx="7" fill="#fbf9f3" stroke="#ddd6c6"/>
      <text x="636" y="633" fill="#2f7d6e">#</text><text x="648" y="633" fill="#4d5658">zettelkasten</text>
      <rect x="752" y="614" width="92" height="28" rx="7" fill="#fbf9f3" stroke="#ddd6c6"/>
      <text x="764" y="633" fill="#2f7d6e">#</text><text x="776" y="633" fill="#4d5658">linking</text>
      <rect x="854" y="614" width="76" height="28" rx="7" fill="#fbf9f3" stroke="#ddd6c6"/>
      <text x="866" y="633" fill="#2f7d6e">#</text><text x="878" y="633" fill="#4d5658">tools</text>
    </g>

    <text x="624" y="690" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" fill="#2f7d6e">Read the note  &#8594;</text>
  </g>

  <line x1="80" y1="760" x2="1120" y2="760" stroke="#ddd6c6" stroke-width="2"/>

  <!-- NOTE CARD: thumbnail + text -->
  <rect x="80" y="792" width="168" height="92" rx="11" fill="url(#thumb)"/>
  <text x="164" y="858" font-size="52" font-weight="600" fill="#245f54" opacity="0.4" text-anchor="middle">P</text>
  <g>
    <rect x="284" y="794" width="92" height="26" rx="13" fill="#eef5f2" stroke="#dbe9e4" stroke-width="1"/>
    <text x="298" y="812" font-family="Arial, Helvetica, sans-serif" font-size="11.5" font-weight="700" letter-spacing="1.2" fill="#2f7d6e">PRACTICE</text>
    <circle cx="398" cy="807" r="3.5" fill="#b06a2c"/>
    <text x="408" y="812" font-family="Arial, Helvetica, sans-serif" font-size="12.5" fill="#79827f">Planted Jun 11</text>
    <text x="284" y="852" font-size="25" font-weight="600" fill="#232a2b">Write the note before you forget the why</text>
    <text x="284" y="882" font-size="16" fill="#4d5658" font-family="Georgia, serif">Capture the reason a thing mattered, not just the thing.</text>
  </g>

  <!-- Sidebar "stack" hint -->
  <rect x="1024" y="792" width="96" height="92" rx="10" fill="#fbf9f3" stroke="#ddd6c6" stroke-width="1"/>
  <text x="1040" y="816" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="700" letter-spacing="1.5" fill="#79827f">TAGS</text>
  <line x1="1040" y1="824" x2="1104" y2="824" stroke="#ddd6c6" stroke-width="1" stroke-dasharray="3 3"/>
  <rect x="1040" y="834" width="34" height="16" rx="5" fill="#f0ece1" stroke="#ddd6c6"/>
  <rect x="1080" y="834" width="24" height="16" rx="5" fill="#f0ece1" stroke="#ddd6c6"/>
  <rect x="1040" y="856" width="26" height="16" rx="5" fill="#f0ece1" stroke="#ddd6c6"/>
  <rect x="1072" y="856" width="32" height="16" rx="5" fill="#f0ece1" stroke="#ddd6c6"/>
</svg>
