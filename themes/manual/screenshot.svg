<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" font-family="-apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="cover" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d6eef2"/>
      <stop offset="0.55" stop-color="#9fd0d9"/>
      <stop offset="1" stop-color="#5fa7b3"/>
    </linearGradient>
    <linearGradient id="mark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#28909f"/>
      <stop offset="1" stop-color="#185c69"/>
    </linearGradient>
    <pattern id="grid" width="22" height="22" patternUnits="userSpaceOnUse">
      <path d="M22 0H0V22" fill="none" stroke="#eef2f6" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Canvas -->
  <rect width="1200" height="900" fill="#f6f8fa"/>

  <!-- Sticky header -->
  <rect x="0" y="0" width="1200" height="78" fill="#ffffff"/>
  <line x1="0" y1="78" x2="1200" y2="78" stroke="#e2e8f0" stroke-width="2"/>
  <!-- Book mark -->
  <rect x="56" y="22" width="34" height="34" rx="8" fill="url(#mark)"/>
  <path d="M66 30h14v18h-14a2 2 0 0 0-2 2V32a2 2 0 0 1 2-2Z" fill="none" stroke="#ffffff" stroke-width="1.8" stroke-linejoin="round"/>
  <line x1="69" y1="35" x2="77" y2="35" stroke="#ffffff" stroke-width="1.6" stroke-linecap="round"/>
  <line x1="69" y1="39" x2="77" y2="39" stroke="#ffffff" stroke-width="1.6" stroke-linecap="round"/>
  <!-- Title + version chip -->
  <text x="104" y="46" font-size="24" font-weight="700" fill="#1c2430" letter-spacing="-0.5">Northstar Docs</text>
  <rect x="278" y="29" width="50" height="22" rx="11" fill="#eef6f7" stroke="#d6e9ec" stroke-width="1"/>
  <text x="289" y="44" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="12" font-weight="600" fill="#185c69">v2.4</text>
  <!-- Header search -->
  <rect x="740" y="22" width="240" height="34" rx="8" fill="#f0f3f6"/>
  <circle cx="762" cy="39" r="6" fill="none" stroke="#6b7686" stroke-width="2"/>
  <line x1="766.5" y1="43.5" x2="771" y2="48" stroke="#6b7686" stroke-width="2" stroke-linecap="round"/>
  <text x="782" y="44" font-size="14" fill="#6b7686">Search the docs…</text>
  <!-- Nav -->
  <g font-size="15" font-weight="600">
    <text x="1018" y="44" fill="#1f7a8c">Guides</text>
    <text x="1100" y="44" fill="#45505f">API</text>
  </g>

  <!-- ===================== LEFT DOCS-NAV RAIL ===================== -->
  <rect x="56" y="120" width="252" height="724" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="76" y="152" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="12" font-weight="600" letter-spacing="1" fill="#6b7686">CONTENTS</text>
  <rect x="256" y="139" width="34" height="18" rx="9" fill="#f0f3f6"/>
  <text x="264" y="152" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="11" fill="#6b7686">14</text>
  <line x1="76" y1="166" x2="288" y2="166" stroke="#eef2f6" stroke-width="1"/>

  <g font-size="14.5">
    <text x="76" y="196" font-weight="600" fill="#1c2430">Getting started</text>
    <!-- active child -->
    <rect x="68" y="208" width="228" height="28" rx="5" fill="#eef6f7"/>
    <rect x="68" y="208" width="3" height="28" fill="#1f7a8c"/>
    <text x="96" y="227" font-weight="600" fill="#185c69">Installation</text>
    <text x="96" y="257" fill="#45505f">Quick start</text>
    <text x="96" y="285" fill="#45505f">Configuration</text>

    <text x="76" y="325" font-weight="600" fill="#1c2430">Core concepts</text>
    <text x="96" y="353" fill="#45505f">Architecture</text>
    <text x="96" y="381" fill="#45505f">Data model</text>
    <text x="96" y="409" fill="#45505f">Lifecycle</text>

    <text x="76" y="449" font-weight="600" fill="#1c2430">Guides</text>
    <text x="96" y="477" fill="#45505f">Authentication</text>
    <text x="96" y="505" fill="#45505f">Deployments</text>

    <text x="76" y="545" font-weight="600" fill="#1c2430">API reference</text>
    <text x="96" y="573" fill="#45505f">Endpoints</text>
    <text x="96" y="601" fill="#45505f">Webhooks</text>
  </g>
  <!-- nested rail lines -->
  <line x1="84" y1="244" x2="84" y2="290" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="84" y1="340" x2="84" y2="414" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="84" y1="464" x2="84" y2="510" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="84" y1="560" x2="84" y2="606" stroke="#e2e8f0" stroke-width="1"/>

  <!-- ===================== DOCS HERO ===================== -->
  <rect x="340" y="120" width="804" height="196" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="340" y="120" width="804" height="196" rx="12" fill="url(#grid)" opacity="0.5"/>
  <line x1="364" y1="156" x2="388" y2="156" stroke="#1f7a8c" stroke-width="2" stroke-linecap="round"/>
  <text x="398" y="161" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="12" font-weight="600" letter-spacing="1" fill="#185c69">DOCUMENTATION</text>
  <text x="364" y="206" font-size="34" font-weight="700" fill="#1c2430" letter-spacing="-0.6">Build, ship, and document</text>
  <text x="364" y="240" font-size="16" fill="#45505f">Everything you need to get started, in one calm, searchable place.</text>
  <!-- hero search -->
  <rect x="364" y="258" width="420" height="40" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
  <circle cx="388" cy="278" r="6" fill="none" stroke="#6b7686" stroke-width="2"/>
  <line x1="392.5" y1="282.5" x2="397" y2="287" stroke="#6b7686" stroke-width="2" stroke-linecap="round"/>
  <text x="408" y="283" font-size="14" fill="#6b7686">Search the docs…</text>
  <rect x="694" y="266" width="82" height="24" rx="6" fill="#1f7a8c"/>
  <text x="717" y="283" font-size="13" font-weight="600" fill="#ffffff">Search</text>

  <!-- ===================== LEAD DOC ===================== -->
  <rect x="340" y="340" width="380" height="250" rx="12" fill="url(#cover)"/>
  <rect x="372" y="372" width="120" height="62" rx="8" fill="#ffffff" opacity="0.22"/>
  <rect x="372" y="446" width="200" height="14" rx="7" fill="#ffffff" opacity="0.3"/>
  <rect x="372" y="470" width="160" height="14" rx="7" fill="#ffffff" opacity="0.22"/>

  <g>
    <rect x="744" y="344" width="118" height="24" rx="5" fill="#eef6f7" stroke="#d6e9ec" stroke-width="1"/>
    <text x="756" y="361" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="12" font-weight="600" fill="#185c69"># guides</text>
    <text x="744" y="408" font-size="26" font-weight="700" fill="#1c2430" letter-spacing="-0.5">Your first deploy</text>
    <text x="744" y="436" font-size="26" font-weight="700" fill="#1c2430" letter-spacing="-0.5">in five minutes</text>
    <g font-size="15.5" fill="#45505f">
      <text x="744" y="476">From zero to a live build with one command —</text>
      <text x="744" y="500">no config to write, nothing to wire up first.</text>
    </g>
    <text x="744" y="546" font-size="15" font-weight="600" fill="#1f7a8c">Read the guide  &#8594;</text>
  </g>

  <line x1="340" y1="614" x2="1144" y2="614" stroke="#e2e8f0" stroke-width="1"/>

  <!-- ===================== CARD GRID (2-up) ===================== -->
  <rect x="340" y="638" width="390" height="186" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="364" y="662" width="96" height="22" rx="5" fill="#eef6f7" stroke="#d6e9ec" stroke-width="1"/>
  <text x="376" y="678" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="11" font-weight="600" fill="#185c69"># concepts</text>
  <text x="364" y="714" font-size="20" font-weight="700" fill="#1c2430">The data model</text>
  <text x="364" y="744" font-size="14.5" fill="#45505f">How resources relate, and why the schema</text>
  <text x="364" y="765" font-size="14.5" fill="#45505f">stays small on purpose.</text>
  <text x="364" y="800" font-size="14" font-weight="600" fill="#1f7a8c">Open  &#8594;</text>

  <rect x="754" y="638" width="390" height="186" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <!-- code-block flavored card -->
  <rect x="778" y="662" width="342" height="92" rx="8" fill="#0f1722"/>
  <rect x="778" y="662" width="342" height="3" rx="2" fill="#1f7a8c"/>
  <g font-family="ui-monospace, Menlo, Consolas, monospace" font-size="13">
    <text x="794" y="688" fill="#7fd1de">$</text>
    <text x="812" y="688" fill="#e7edf3">npx northstar init</text>
    <text x="794" y="710" fill="#6b8294">&#8250; created northstar.config.js</text>
    <text x="794" y="732" fill="#6b8294">&#8250; ready in 0.8s</text>
  </g>
  <text x="778" y="784" font-size="20" font-weight="700" fill="#1c2430">Configuration</text>
  <text x="778" y="810" font-size="14.5" fill="#45505f">Every option, with copy-paste defaults.</text>
</svg>
