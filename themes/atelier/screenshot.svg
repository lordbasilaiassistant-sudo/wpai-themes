<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <linearGradient id="feature" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#cdbfb2"/>
      <stop offset="0.55" stop-color="#a78d7e"/>
      <stop offset="1" stop-color="#6f5a50"/>
    </linearGradient>
    <linearGradient id="t1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ded6c8"/>
      <stop offset="1" stop-color="#b3a892"/>
    </linearGradient>
    <linearGradient id="t2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d8cdc7"/>
      <stop offset="1" stop-color="#a89089"/>
    </linearGradient>
  </defs>

  <!-- Bone paper -->
  <rect width="1200" height="900" fill="#f4f1ea"/>

  <!-- Header -->
  <rect x="0" y="0" width="1200" height="100" fill="#f4f1ea"/>
  <line x1="0" y1="100" x2="1200" y2="100" stroke="#ddd7c9" stroke-width="1.5"/>
  <text x="80" y="52" font-size="32" font-weight="500" fill="#1c1b19" letter-spacing="-0.5">Maren &amp; Vale</text>
  <text x="80" y="76" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="600" letter-spacing="3" fill="#847f74">DESIGN STUDIO</text>
  <g font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="600" letter-spacing="1.6">
    <text x="812" y="56" fill="#7c3a36">WORK</text>
    <text x="888" y="56" fill="#4b4842">STUDIO</text>
    <text x="982" y="56" fill="#4b4842">OBJECTS</text>
    <text x="1084" y="56" fill="#4b4842">NOTES</text>
  </g>

  <!-- Studio statement -->
  <text x="80" y="176" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="600" letter-spacing="3.5" fill="#847f74">SELECTED WORK</text>
  <text x="78" y="252" font-size="68" font-weight="500" fill="#1c1b19" letter-spacing="-2">We make quiet,</text>
  <text x="78" y="318" font-size="68" font-weight="500" fill="#1c1b19" letter-spacing="-2">considered things.</text>
  <g font-size="19" fill="#4b4842">
    <text x="892" y="294">A working portfolio of design,</text>
    <text x="892" y="320">objects, and notes from the bench.</text>
  </g>

  <!-- Feature plate: cover + body -->
  <rect x="80" y="384" width="600" height="372" rx="2" fill="url(#feature)"/>
  <text x="98" y="412" font-family="Consolas, monospace" font-size="13" letter-spacing="1.5" fill="#f4f1ea" opacity="0.85">01</text>
  <!-- clip-reveal slit hint -->
  <rect x="80" y="384" width="600" height="372" rx="2" fill="none" stroke="#1c1b19" stroke-opacity="0.06" stroke-width="1"/>

  <g>
    <text x="724" y="448" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="600" letter-spacing="2" fill="#7c3a36">IDENTITY</text>
    <line x1="724" y1="458" x2="800" y2="458" stroke="#ece1de" stroke-width="1.5"/>
    <text x="724" y="512" font-size="40" font-weight="500" fill="#1c1b19" letter-spacing="-1">Ferro &amp; Salt</text>
    <text x="724" y="552" font-size="40" font-weight="500" fill="#1c1b19" letter-spacing="-1">— a maker's mark</text>
    <g font-size="19" fill="#4b4842">
      <text x="724" y="606">A full identity for a small-batch</text>
      <text x="724" y="634">kitchen-tool studio: wordmark,</text>
      <text x="724" y="662">packaging, and a quiet catalogue.</text>
    </g>
    <text x="724" y="722" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="600" letter-spacing="1.8" fill="#7c3a36">VIEW PROJECT  &#8594;</text>
  </g>

  <!-- Cursor-following caption (signature) -->
  <g>
    <rect x="372" y="560" width="172" height="34" rx="17" fill="#1c1b19"/>
    <text x="392" y="582" font-family="Arial, Helvetica, sans-serif" font-size="11.5" font-weight="600" letter-spacing="1.4" fill="#e7c6b8">&#9671;</text>
    <text x="412" y="582" font-family="Arial, Helvetica, sans-serif" font-size="11.5" font-weight="600" letter-spacing="1.4" fill="#fbfaf6">FERRO &amp; SALT</text>
    <circle cx="372" cy="600" r="4" fill="#1c1b19"/>
  </g>

  <!-- Project grid row -->
  <rect x="80" y="792" width="290" height="84" rx="2" fill="url(#t1)"/>
  <text x="98" y="816" font-family="Consolas, monospace" font-size="12" letter-spacing="1.5" fill="#f4f1ea" opacity="0.85">02</text>

  <rect x="402" y="792" width="290" height="84" rx="2" fill="url(#t2)"/>
  <text x="420" y="816" font-family="Consolas, monospace" font-size="12" letter-spacing="1.5" fill="#f4f1ea" opacity="0.85">03</text>

  <!-- Sidebar hint -->
  <rect x="724" y="792" width="396" height="84" rx="2" fill="#fbfaf6" stroke="#ddd7c9" stroke-width="1"/>
  <text x="744" y="822" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="600" letter-spacing="3" fill="#847f74">IN THE STUDIO</text>
  <line x1="744" y1="838" x2="1100" y2="838" stroke="#e9e4d8" stroke-width="1"/>
  <line x1="744" y1="856" x2="980" y2="856" stroke="#e9e4d8" stroke-width="1"/>
</svg>
