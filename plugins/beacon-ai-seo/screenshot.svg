    <text x="120" y="742" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15" fill="#cbd5e1">- [On structure](/structure): the…</text>
    <text x="120" y="768" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15" fill="#cbd5e1">- [Clean code](/clean): why less…</text>
    <text x="120" y="806" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" fill="#475569">Generated 2026-06-21 by Beacon.</text>
  </g>

  <!-- RIGHT CARD: structured data / head output -->
  <g>
    <rect x="608" y="400" width="500" height="430" rx="16" fill="#0f1a30" stroke="#1e293b" stroke-width="2"/>
    <rect x="608" y="400" width="500" height="52" rx="16" fill="#13213c"/>
    <rect x="608" y="436" width="500" height="16" fill="#13213c"/>
