<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" role="img" aria-label="Beacon — AI &amp; SEO preview">
  <defs>
    <linearGradient id="beacon-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#111c33"/>
    </linearGradient>
    <linearGradient id="beacon-beam" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#38bdf8" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#38bdf8" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="beacon-glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#7dd3fc"/>
      <stop offset="1" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Page background -->
  <rect width="1200" height="900" fill="url(#beacon-bg)"/>

  <!-- Signal beam emanating from the beacon -->
  <polygon points="600,150 360,470 840,470" fill="url(#beacon-beam)"/>
  <polygon points="600,150 260,520 940,520" fill="url(#beacon-beam)" opacity="0.5"/>

  <!-- The beacon mark: a lighthouse-like signal node -->
  <circle cx="600" cy="150" r="70" fill="url(#beacon-glow)"/>
  <circle cx="600" cy="150" r="30" fill="#38bdf8"/>
  <circle cx="600" cy="150" r="14" fill="#e0f2fe"/>
  <circle cx="600" cy="150" r="48" fill="none" stroke="#7dd3fc" stroke-width="3" opacity="0.6"/>
  <circle cx="600" cy="150" r="62" fill="none" stroke="#7dd3fc" stroke-width="2" opacity="0.3"/>

  <!-- Title -->
  <text x="600" y="300" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="46" font-weight="800" fill="#f1f5f9" text-anchor="middle" letter-spacing="0.5">Beacon — AI &amp; SEO</text>
  <text x="600" y="342" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="22" font-weight="500" fill="#94a3b8" text-anchor="middle">Discoverable by search engines AND AI agents — zero config</text>

  <!-- LEFT CARD: the /llms.txt document -->
  <g>
