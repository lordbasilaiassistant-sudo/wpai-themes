      <text x="690" y="720">BreadcrumbList</text>
    </g>
    <text x="636" y="752" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="16" font-weight="700" fill="#6ee7b7">]</text>

    <!-- checkmarks: escaped + real-data-only -->
    <g font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#64748b">
      <text x="636" y="800">✓ escaped output</text>
      <text x="800" y="800">✓ only real-data nodes</text>
    </g>
  </g>

  <!-- Caption -->
  <text x="600" y="872" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="20" font-weight="600" fill="#64748b" text-anchor="middle">Auto meta · Open Graph · Twitter cards · JSON-LD @graph · machine-readable /llms.txt</text>
</svg>
