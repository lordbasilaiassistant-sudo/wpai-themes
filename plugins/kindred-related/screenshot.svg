<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" role="img" aria-label="Kindred Related Posts preview">
  <defs>
    <linearGradient id="kindred-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eef2f7"/>
    </linearGradient>
    <linearGradient id="kindred-photo" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#60a5fa"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="kindred-ph-1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#ef4444"/>
    </linearGradient>
    <linearGradient id="kindred-ph-2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#10b981"/>
      <stop offset="1" stop-color="#0ea5e9"/>
    </linearGradient>
    <filter id="kindred-card-shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0f172a" flood-opacity="0.16"/>
    </filter>
  </defs>

  <!-- Page background -->
  <rect width="1200" height="900" fill="url(#kindred-bg)"/>

  <!-- Browser chrome -->
  <rect x="80" y="60" width="1040" height="780" rx="18" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
  <rect x="80" y="60" width="1040" height="56" rx="18" fill="#f1f5f9"/>
  <rect x="80" y="98" width="1040" height="18" fill="#f1f5f9"/>
  <circle cx="116" cy="88" r="8" fill="#f87171"/>
  <circle cx="144" cy="88" r="8" fill="#fbbf24"/>
  <circle cx="172" cy="88" r="8" fill="#34d399"/>
  <rect x="210" y="76" width="820" height="24" rx="12" fill="#e2e8f0"/>

  <!-- Tail of the article above the section -->
  <rect x="140" y="160" width="900" height="14" rx="7" fill="#e2e8f0"/>
  <rect x="140" y="190" width="900" height="14" rx="7" fill="#e2e8f0"/>
  <rect x="140" y="220" width="640" height="14" rx="7" fill="#e2e8f0"/>

  <!-- Section heading with underline rule -->
  <text x="140" y="312" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="30" font-weight="700" fill="#1f2937">You might also like</text>
  <rect x="140" y="332" width="900" height="2" fill="#e2e8f0"/>

  <!-- Card 1: featured image -->
  <g filter="url(#kindred-card-shadow)">
    <rect x="140" y="372" width="288" height="372" rx="14" fill="#ffffff" stroke="#e8edf3" stroke-width="1.5"/>
  </g>
  <path d="M140 386 a14 14 0 0 1 14 -14 h260 a14 14 0 0 1 14 14 v148 h-288 z" fill="url(#kindred-photo)"/>
  <!-- little mountain glyph to read as a photo -->
  <polyline points="180 470 230 410 270 460 300 430 388 510" fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>
  <circle cx="360" cy="408" r="16" fill="#ffffff" opacity="0.9"/>
  <rect x="164" y="556" width="240" height="16" rx="8" fill="#1f2937"/>
  <rect x="164" y="584" width="180" height="16" rx="8" fill="#334155"/>
  <rect x="164" y="700" width="120" height="13" rx="6.5" fill="#94a3b8"/>

  <!-- Card 2: gradient placeholder with letter -->
  <g filter="url(#kindred-card-shadow)">
    <rect x="446" y="372" width="288" height="372" rx="14" fill="#ffffff" stroke="#e8edf3" stroke-width="1.5"/>
  </g>
  <path d="M446 386 a14 14 0 0 1 14 -14 h260 a14 14 0 0 1 14 14 v148 h-288 z" fill="url(#kindred-ph-1)"/>
  <text x="590" y="478" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="76" font-weight="800" fill="#ffffff" text-anchor="middle" dominant-baseline="middle">D</text>
  <rect x="470" y="556" width="240" height="16" rx="8" fill="#1f2937"/>
  <rect x="470" y="584" width="156" height="16" rx="8" fill="#334155"/>
  <rect x="470" y="700" width="120" height="13" rx="6.5" fill="#94a3b8"/>

  <!-- Card 3: gradient placeholder with letter -->
  <g filter="url(#kindred-card-shadow)">
    <rect x="752" y="372" width="288" height="372" rx="14" fill="#ffffff" stroke="#e8edf3" stroke-width="1.5"/>
  </g>
  <path d="M752 386 a14 14 0 0 1 14 -14 h260 a14 14 0 0 1 14 14 v148 h-288 z" fill="url(#kindred-ph-2)"/>
  <text x="896" y="478" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="76" font-weight="800" fill="#ffffff" text-anchor="middle" dominant-baseline="middle">K</text>
  <rect x="776" y="556" width="240" height="16" rx="8" fill="#1f2937"/>
  <rect x="776" y="584" width="200" height="16" rx="8" fill="#334155"/>
  <rect x="776" y="612" width="120" height="16" rx="8" fill="#334155"/>
  <rect x="776" y="700" width="120" height="13" rx="6.5" fill="#94a3b8"/>

  <!-- Caption -->
  <text x="600" y="808" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="22" font-weight="600" fill="#475569" text-anchor="middle">Kindred — related posts by category, then tags, then recency. Theme-adaptive &amp; accessible.</text>
</svg>
