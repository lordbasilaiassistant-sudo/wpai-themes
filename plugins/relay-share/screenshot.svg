<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" role="img" aria-label="Relay — Social Share preview">
  <defs>
    <linearGradient id="relay-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eef2f7"/>
    </linearGradient>
  </defs>

  <!-- Page background -->
  <rect width="1200" height="900" fill="url(#relay-bg)"/>

  <!-- Browser chrome -->
  <rect x="80" y="70" width="1040" height="760" rx="18" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
  <rect x="80" y="70" width="1040" height="56" rx="18" fill="#f1f5f9"/>
  <rect x="80" y="108" width="1040" height="18" fill="#f1f5f9"/>
  <circle cx="116" cy="98" r="8" fill="#f87171"/>
  <circle cx="144" cy="98" r="8" fill="#fbbf24"/>
  <circle cx="172" cy="98" r="8" fill="#34d399"/>
  <rect x="210" y="86" width="820" height="24" rx="12" fill="#e2e8f0"/>

  <!-- Article headline + body, with the share bar appended after the content -->
  <rect x="140" y="172" width="520" height="34" rx="8" fill="#1f2937"/>
  <rect x="140" y="232" width="900" height="14" rx="7" fill="#cbd5e1"/>
  <rect x="140" y="262" width="900" height="14" rx="7" fill="#cbd5e1"/>
  <rect x="140" y="292" width="760" height="14" rx="7" fill="#cbd5e1"/>

  <!-- Divider above the share bar (the .relay top border) -->
  <rect x="140" y="352" width="900" height="2" rx="1" fill="#1f293724"/>

  <!-- "SHARE THIS" eyebrow -->
  <text x="140" y="390" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="15" font-weight="700" letter-spacing="3" fill="#64748b">SHARE THIS</text>

  <!-- Share pills (light theme) -->
  <g font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="17" font-weight="600" fill="#334155">
    <!-- Copy link (shown in the "Copied!" confirmation state) -->
    <rect x="140" y="412" width="156" height="48" rx="24" fill="#1f293714" stroke="#1f29373d" stroke-width="2"/>
    <path d="M168 436 l6 6 l11 -12" fill="none" stroke="#16a34a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="196" y="442" fill="#16a34a" font-weight="700">Copied!</text>

    <!-- X -->
    <rect x="312" y="412" width="120" height="48" rx="24" fill="#1f29370d" stroke="#1f293724" stroke-width="2"/>
    <path transform="translate(338,426) scale(0.83)" fill="#334155" d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24h-6.657l-5.214-6.817-5.966 6.817H1.68l7.73-8.835L1.254 2.25h6.826l4.713 6.231 5.451-6.231Zm-1.161 17.52h1.833L7.084 4.126H5.117L17.083 19.77Z"/>
    <text x="368" y="442">X</text>

    <!-- Bluesky -->
    <rect x="448" y="412" width="176" height="48" rx="24" fill="#1f29370d" stroke="#1f293724" stroke-width="2"/>
    <path transform="translate(474,426) scale(0.83)" fill="#0a7aff" d="M6.34 4.06C8.7 5.83 11.24 9.42 12 11.35c.76-1.93 3.3-5.52 5.66-7.29 1.7-1.28 4.46-2.27 4.46.88 0 .63-.36 5.29-.57 6.05-.74 2.62-3.41 3.29-5.79 2.89 4.16.71 5.22 3.06 2.94 5.41-4.34 4.46-6.24-1.12-6.72-2.55-.09-.26-.13-.38-.13-.27 0-.11-.04.01-.13.27-.49 1.43-2.38 7.01-6.72 2.55-2.29-2.35-1.22-4.7 2.94-5.41-2.38.4-5.06-.27-5.79-2.89C1.9 10.4 1.54 5.74 1.54 5.11c0-3.15 2.76-2.16 4.46-.88l.34.27Z"/>
    <text x="504" y="442">Bluesky</text>

    <!-- LinkedIn -->
    <rect x="640" y="412" width="184" height="48" rx="24" fill="#1f29370d" stroke="#1f293724" stroke-width="2"/>
    <path transform="translate(666,426) scale(0.83)" fill="#0a66c2" d="M20.45 20.45h-3.56v-5.57c0-1.33-.02-3.04-1.85-3.04-1.85 0-2.14 1.45-2.14 2.94v5.67H9.35V9h3.41v1.56h.05c.48-.9 1.64-1.85 3.37-1.85 3.6 0 4.27 2.37 4.27 5.46v6.28ZM5.34 7.43a2.07 2.07 0 1 1 0-4.13 2.07 2.07 0 0 1 0 4.13ZM7.12 20.45H3.56V9h3.56v11.45ZM22.22 0H1.77C.79 0 0 .77 0 1.73v20.54C0 23.22.79 24 1.77 24h20.45c.98 0 1.78-.78 1.78-1.73V1.73C24 .77 23.2 0 22.22 0Z"/>
    <text x="696" y="442">LinkedIn</text>

    <!-- Mastodon -->
    <rect x="840" y="412" width="186" height="48" rx="24" fill="#1f29370d" stroke="#1f293724" stroke-width="2"/>
    <path transform="translate(866,426) scale(0.83)" fill="#6364ff" d="M21.33 5.36C21 2.94 18.88 1.03 16.37.66 15.94.6 14.34.36 10.63.36h-.03C6.89.36 6.1.6 5.66.66 3.22 1.02 1 2.74.46 5.19.2 6.4.17 7.74.22 8.97c.07 1.76.08 3.52.24 5.27.11 1.16.31 2.32.6 3.45.55 2.09 2.62 3.83 4.66 4.54 2.18.74 4.53.87 6.78.36.25-.06.49-.13.73-.21.54-.17 1.17-.36 1.63-.7a.05.05 0 0 0 .02-.04v-1.7a.05.05 0 0 0-.06-.05c-1.43.34-2.9.51-4.37.51-2.54 0-3.22-1.2-3.42-1.7a5.3 5.3 0 0 1-.3-1.35.04.04 0 0 1 .05-.05c1.4.34 2.85.51 4.3.51.35 0 .7 0 1.05-.01 1.46-.04 3-.12 4.44-.4l.1-.02c2.27-.44 4.43-1.81 4.65-5.27.01-.14.03-1.43.03-1.57 0-.48.15-3.4-.02-5.19Z"/>
    <text x="896" y="442">Mastodon</text>
  </g>

  <!-- Dark-theme swatch: the same bar on a dark surface, proving theme adaptivity -->
  <g>
    <rect x="140" y="520" width="900" height="200" rx="14" fill="#0f172a"/>

    <text x="172" y="566" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="14" font-weight="700" letter-spacing="3" fill="#94a3b8">SHARE THIS</text>

    <g font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="16" font-weight="600" fill="#e2e8f0">
      <!-- Copy (default state on dark) -->
      <rect x="172" y="586" width="150" height="44" rx="22" fill="#ffffff14" stroke="#ffffff2e" stroke-width="2"/>
      <path transform="translate(192,597) scale(0.8)" fill="none" stroke="#e2e8f0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M9 13a5 5 0 0 0 7.07 0l3-3A5 5 0 0 0 12 3l-1.5 1.5"/>
      <path transform="translate(192,597) scale(0.8)" fill="none" stroke="#e2e8f0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M15 11a5 5 0 0 0-7.07 0l-3 3A5 5 0 0 0 12 21l1.5-1.5"/>
      <text x="220" y="614">Copy link</text>

      <!-- X -->
      <rect x="338" y="586" width="112" height="44" rx="22" fill="#ffffff0f" stroke="#ffffff24" stroke-width="2"/>
      <path transform="translate(362,598) scale(0.8)" fill="#e2e8f0" d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24h-6.657l-5.214-6.817-5.966 6.817H1.68l7.73-8.835L1.254 2.25h6.826l4.713 6.231 5.451-6.231Zm-1.161 17.52h1.833L7.084 4.126H5.117L17.083 19.77Z"/>
      <text x="390" y="614">X</text>

      <!-- Bluesky -->
      <rect x="466" y="586" width="166" height="44" rx="22" fill="#ffffff0f" stroke="#ffffff24" stroke-width="2"/>
      <path transform="translate(490,598) scale(0.8)" fill="#4aa8ff" d="M6.34 4.06C8.7 5.83 11.24 9.42 12 11.35c.76-1.93 3.3-5.52 5.66-7.29 1.7-1.28 4.46-2.27 4.46.88 0 .63-.36 5.29-.57 6.05-.74 2.62-3.41 3.29-5.79 2.89 4.16.71 5.22 3.06 2.94 5.41-4.34 4.46-6.24-1.12-6.72-2.55-.09-.26-.13-.38-.13-.27 0-.11-.04.01-.13.27-.49 1.43-2.38 7.01-6.72 2.55-2.29-2.35-1.22-4.7 2.94-5.41-2.38.4-5.06-.27-5.79-2.89C1.9 10.4 1.54 5.74 1.54 5.11c0-3.15 2.76-2.16 4.46-.88l.34.27Z"/>
      <text x="518" y="614">Bluesky</text>

      <!-- Email -->
      <rect x="648" y="586" width="138" height="44" rx="22" fill="#ffffff0f" stroke="#ffffff24" stroke-width="2"/>
      <path transform="translate(672,598) scale(0.8)" fill="none" stroke="#e2e8f0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M4 5h16a1 1 0 0 1 1 1v12a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V6a1 1 0 0 1 1-1Z"/>
      <path transform="translate(672,598) scale(0.8)" fill="none" stroke="#e2e8f0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="m3.5 6.5 8.5 6 8.5-6"/>
      <text x="700" y="614">Email</text>
    </g>

    <!-- Caption inside the dark panel -->
    <text x="172" y="676" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="21" font-weight="700" fill="#f1f5f9">No tracking. No widgets. Just links.</text>
    <text x="172" y="702" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="16" font-weight="500" fill="#94a3b8">Inline SVG icons, currentColor styling, an accessible "Copied!" confirmation — on any theme.</text>
  </g>

  <!-- Caption -->
  <text x="600" y="800" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="22" font-weight="600" fill="#475569" text-anchor="middle">Relay — Social Share · privacy-first, theme-adaptive, accessible, zero config</text>
</svg>
