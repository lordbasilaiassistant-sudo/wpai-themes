<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" role="img" aria-label="Oracle — FAQ & Schema preview">
  <defs>
    <linearGradient id="oracle-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eef2f7"/>
    </linearGradient>
  </defs>

  <!-- Page background -->
  <rect width="1200" height="900" fill="url(#oracle-bg)"/>

  <!-- Browser chrome -->
  <rect x="80" y="70" width="1040" height="760" rx="18" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
  <rect x="80" y="70" width="1040" height="56" rx="18" fill="#f1f5f9"/>
  <rect x="80" y="108" width="1040" height="18" fill="#f1f5f9"/>
  <circle cx="116" cy="98" r="8" fill="#f87171"/>
  <circle cx="144" cy="98" r="8" fill="#fbbf24"/>
  <circle cx="172" cy="98" r="8" fill="#34d399"/>
  <rect x="210" y="86" width="820" height="24" rx="12" fill="#e2e8f0"/>

  <!-- Section headline -->
  <rect x="140" y="170" width="430" height="30" rx="8" fill="#1f2937"/>

  <!-- The FAQ accordion (light theme) -->
  <g>
    <!-- Item 1: OPEN — question row + answer panel + rotated chevron -->
    <rect x="140" y="232" width="560" height="190" rx="12" fill="#1f29370a" stroke="#1f293724" stroke-width="2"/>
    <rect x="166" y="262" width="330" height="16" rx="8" fill="#1f2937"/>
    <!-- Chevron, "open" (pointing up) -->
    <polyline points="650,272 662,260 674,272" fill="none" stroke="#64748b" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Divider into the answer -->
    <rect x="166" y="304" width="508" height="1.5" fill="#1f293718"/>
    <!-- Answer lines -->
    <rect x="166" y="326" width="500" height="12" rx="6" fill="#64748b"/>
    <rect x="166" y="352" width="508" height="12" rx="6" fill="#64748b"/>
    <rect x="166" y="378" width="360" height="12" rx="6" fill="#64748b"/>

    <!-- Item 2: closed -->
    <rect x="140" y="438" width="560" height="62" rx="12" fill="#1f29370a" stroke="#1f293724" stroke-width="2"/>
    <rect x="166" y="461" width="380" height="16" rx="8" fill="#1f2937"/>
    <polyline points="650,464 662,476 674,464" fill="none" stroke="#64748b" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Item 3: closed -->
    <rect x="140" y="516" width="560" height="62" rx="12" fill="#1f29370a" stroke="#1f293724" stroke-width="2"/>
    <rect x="166" y="539" width="300" height="16" rx="8" fill="#1f2937"/>
    <polyline points="650,542 662,554 674,542" fill="none" stroke="#64748b" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- JSON-LD peek panel: the schema that ships with the same content -->
  <g>
    <rect x="730" y="232" width="290" height="346" rx="12" fill="#0f172a"/>
    <text x="752" y="266" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" font-weight="700" fill="#94a3b8">&lt;script type="application/ld+json"&gt;</text>
    <text x="762" y="296" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" fill="#7dd3fc">"@type": "FAQPage",</text>
    <text x="762" y="322" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" fill="#7dd3fc">"mainEntity": [</text>
    <text x="778" y="348" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" fill="#a7f3d0">{ "@type": "Question",</text>
    <text x="794" y="372" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" fill="#fcd34d">"name": "…",</text>
    <text x="794" y="396" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" fill="#a7f3d0">"acceptedAnswer": {</text>
    <text x="810" y="420" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" fill="#7dd3fc">"@type": "Answer",</text>
    <text x="810" y="444" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" fill="#fcd34d">"text": "…"</text>
    <text x="794" y="468" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" fill="#a7f3d0">} },</text>
    <text x="778" y="492" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" fill="#64748b">{ … }, { … }</text>
    <text x="762" y="516" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" fill="#7dd3fc">]</text>
    <text x="752" y="548" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" font-weight="700" fill="#94a3b8">&lt;/script&gt;</text>
  </g>

  <!-- Dark-theme swatch: the same accordion on a dark surface, proving adaptivity -->
  <g>
    <rect x="140" y="612" width="880" height="194" rx="14" fill="#0f172a"/>

    <!-- Open item on dark -->
    <rect x="172" y="644" width="430" height="130" rx="10" fill="#ffffff12" stroke="#ffffff24" stroke-width="2"/>
    <rect x="196" y="672" width="250" height="14" rx="7" fill="#f1f5f9"/>
    <polyline points="556,680 568,668 580,680" fill="none" stroke="#94a3b8" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="196" y="708" width="382" height="11" rx="5.5" fill="#94a3b8"/>
    <rect x="196" y="730" width="340" height="11" rx="5.5" fill="#94a3b8"/>

    <!-- Caption inside the dark panel -->
    <text x="650" y="678" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="22" font-weight="700" fill="#f1f5f9">Answers readers can use.</text>
    <text x="650" y="712" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="17" font-weight="500" fill="#94a3b8">Schema search engines and AI agents</text>
    <text x="650" y="736" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="17" font-weight="500" fill="#94a3b8">can read — from one shortcode, any theme.</text>
  </g>

  <!-- Caption -->
  <text x="600" y="868" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="22" font-weight="600" fill="#475569" text-anchor="middle">Oracle — FAQ &amp; Schema · accessible accordion + FAQPage JSON-LD · zero config</text>
</svg>
