<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" role="img" aria-label="Contents — Smart Table of Contents preview">
  <defs>
    <linearGradient id="contents-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eef2f7"/>
    </linearGradient>
  </defs>

  <!-- Page background -->
  <rect width="1200" height="900" fill="url(#contents-bg)"/>

  <!-- Browser chrome -->
  <rect x="80" y="70" width="1040" height="760" rx="18" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
  <rect x="80" y="70" width="1040" height="56" rx="18" fill="#f1f5f9"/>
  <rect x="80" y="108" width="1040" height="18" fill="#f1f5f9"/>
  <circle cx="116" cy="98" r="8" fill="#f87171"/>
  <circle cx="144" cy="98" r="8" fill="#fbbf24"/>
  <circle cx="172" cy="98" r="8" fill="#34d399"/>
  <rect x="210" y="86" width="820" height="24" rx="12" fill="#e2e8f0"/>

  <!-- Article headline -->
  <rect x="140" y="176" width="520" height="36" rx="8" fill="#1f2937"/>

  <!-- The Contents box (light theme) -->
  <g>
    <rect x="140" y="248" width="430" height="338" rx="14" fill="#1f29370d" stroke="#1f293724" stroke-width="2"/>

    <!-- Title (uppercase, muted) -->
    <text x="166" y="288" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="16" font-weight="700" letter-spacing="2" fill="#64748b">CONTENTS</text>

    <!-- Link 1 (h2) -->
    <rect x="160" y="306" width="290" height="14" rx="7" fill="#334155"/>

    <!-- Link 2 (h2) — ACTIVE: faint fill + left accent rail + full-strength -->
    <rect x="158" y="332" width="394" height="30" rx="7" fill="#1f293714"/>
    <rect x="158" y="332" width="3" height="30" rx="1.5" fill="#1f2937"/>
    <rect x="174" y="342" width="250" height="14" rx="7" fill="#1f2937"/>

    <!-- Nested h3 children under the active section, with a guide rail -->
    <rect x="184" y="380" width="2" height="78" rx="1" fill="#1f293733"/>
    <rect x="202" y="382" width="230" height="12" rx="6" fill="#64748b"/>
    <rect x="202" y="410" width="270" height="12" rx="6" fill="#64748b"/>
    <rect x="202" y="438" width="200" height="12" rx="6" fill="#64748b"/>

    <!-- Link 3 (h2) -->
    <rect x="160" y="476" width="320" height="14" rx="7" fill="#334155"/>
    <!-- Link 4 (h2) -->
    <rect x="160" y="506" width="260" height="14" rx="7" fill="#334155"/>
    <!-- Link 5 (h2) -->
    <rect x="160" y="536" width="300" height="14" rx="7" fill="#334155"/>
  </g>

  <!-- Mock article body to the right of / below the box -->
  <rect x="610" y="252" width="370" height="14" rx="7" fill="#cbd5e1"/>
  <rect x="610" y="284" width="370" height="14" rx="7" fill="#cbd5e1"/>
  <rect x="610" y="316" width="320" height="14" rx="7" fill="#cbd5e1"/>
  <rect x="610" y="372" width="200" height="20" rx="6" fill="#1f2937"/>
  <rect x="610" y="416" width="370" height="14" rx="7" fill="#e2e8f0"/>
  <rect x="610" y="448" width="370" height="14" rx="7" fill="#e2e8f0"/>
  <rect x="610" y="480" width="300" height="14" rx="7" fill="#e2e8f0"/>

  <!-- Dark-theme swatch: the same box on a dark surface, proving theme adaptivity -->
  <g>
    <rect x="140" y="620" width="900" height="186" rx="14" fill="#0f172a"/>

    <rect x="172" y="652" width="300" height="120" rx="10" fill="#ffffff14" stroke="#ffffff26" stroke-width="2"/>
    <text x="192" y="684" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="13" font-weight="700" letter-spacing="1.6" fill="#94a3b8">CONTENTS</text>
    <rect x="190" y="700" width="170" height="11" rx="5.5" fill="#cbd5e1"/>
    <!-- Active row on dark -->
    <rect x="186" y="720" width="266" height="22" rx="6" fill="#ffffff1f"/>
    <rect x="186" y="720" width="3" height="22" rx="1.5" fill="#f1f5f9"/>
    <rect x="200" y="727" width="150" height="11" rx="5.5" fill="#f8fafc"/>
    <rect x="190" y="752" width="120" height="11" rx="5.5" fill="#cbd5e1"/>

    <!-- Caption inside the dark panel -->
    <text x="510" y="700" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="22" font-weight="700" fill="#f1f5f9">Reads where you are.</text>
    <text x="510" y="734" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="17" font-weight="500" fill="#94a3b8">Active-section highlight via IntersectionObserver,</text>
    <text x="510" y="758" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="17" font-weight="500" fill="#94a3b8">smooth scroll, and aria-current — on any theme.</text>
  </g>

  <!-- Caption -->
  <text x="600" y="868" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="22" font-weight="600" fill="#475569" text-anchor="middle">Contents — Smart Table of Contents · theme-adaptive, accessible, zero config</text>
</svg>
