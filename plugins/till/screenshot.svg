<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" role="img" aria-label="Till Commerce store preview">
  <defs>
    <linearGradient id="t-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#faf8f3"/>
      <stop offset="1" stop-color="#f1ede4"/>
    </linearGradient>
    <linearGradient id="t-living" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#f3e0cf"/><stop offset="1" stop-color="#e3bd97"/></linearGradient>
    <linearGradient id="t-kitchen" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#cfeee3"/><stop offset="1" stop-color="#9bd8c2"/></linearGradient>
    <linearGradient id="t-light" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#f4ead0"/><stop offset="1" stop-color="#e6cf94"/></linearGradient>
    <linearGradient id="t-acc" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#e2d6f3"/><stop offset="1" stop-color="#c3aae8"/></linearGradient>
    <filter id="t-shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="14" stdDeviation="20" flood-color="#2a2418" flood-opacity="0.18"/>
    </filter>
    <filter id="t-drawer" x="-40%" y="-10%" width="160%" height="120%">
      <feDropShadow dx="-18" dy="0" stdDeviation="26" flood-color="#1b160c" flood-opacity="0.28"/>
    </filter>
  </defs>

  <rect width="1200" height="900" fill="url(#t-bg)"/>

  <!-- Header -->
  <rect x="0" y="0" width="1200" height="84" fill="#ffffff"/>
  <line x1="0" y1="84" x2="1200" y2="84" stroke="#e7e3da" stroke-width="1.5"/>
  <text x="64" y="52" font-family="Georgia, 'Times New Roman', serif" font-size="28" font-weight="700" fill="#15140f">Maison&#160;Verre</text>
  <g font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="16" fill="#54514a">
    <text x="470" y="51">Shop</text>
    <text x="560" y="51">Living</text>
    <text x="660" y="51">Kitchen</text>
    <text x="775" y="51">Journal</text>
  </g>
  <!-- Cart icon + count -->
  <g transform="translate(1086,30)" fill="none" stroke="#15140f" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="6" cy="22" r="1.6"/><circle cx="18" cy="22" r="1.6"/>
    <path d="M-1 0h3l3 13h11l3-9H4"/>
  </g>
  <circle cx="1112" cy="28" r="11" fill="#15140f"/>
  <text x="1112" y="33" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">3</text>

  <!-- Section heading -->
  <text x="64" y="150" font-family="Georgia, serif" font-size="30" font-weight="700" fill="#15140f">New this season</text>
  <text x="64" y="180" font-family="system-ui, sans-serif" font-size="15" fill="#8a857a">Considered objects for a calmer home.</text>

  <!-- Product card template (x4) -->
  <!-- Card 1: Living, on sale -->
  <g filter="url(#t-shadow)"><rect x="64" y="210" width="252" height="300" rx="14" fill="#ffffff"/></g>
  <rect x="64" y="210" width="252" height="220" rx="14" fill="url(#t-living)"/>
  <rect x="64" y="300" width="252" height="130" fill="url(#t-living)"/>
  <rect x="120" y="270" width="140" height="64" rx="10" fill="#c79a6a" opacity="0.65"/>
  <rect x="80" y="226" width="56" height="24" rx="12" fill="#b23a2e"/>
  <text x="108" y="243" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">-25%</text>
  <text x="80" y="462" font-family="system-ui, sans-serif" font-size="11" letter-spacing="1.5" fill="#a39c8d">LIVING</text>
  <text x="80" y="484" font-family="Georgia, serif" font-size="16" font-weight="600" fill="#15140f">Linen Cushion</text>
  <text x="80" y="504" font-family="system-ui, sans-serif" font-size="14" fill="#8a857a"><tspan text-decoration="line-through">$48</tspan> <tspan fill="#b23a2e" font-weight="700">$36</tspan></text>

  <!-- Card 2: Kitchen -->
  <g filter="url(#t-shadow)"><rect x="338" y="210" width="252" height="300" rx="14" fill="#ffffff"/></g>
  <rect x="338" y="210" width="252" height="220" rx="14" fill="url(#t-kitchen)"/>
  <rect x="338" y="300" width="252" height="130" fill="url(#t-kitchen)"/>
  <circle cx="464" cy="300" r="48" fill="#6cc0a3" opacity="0.6"/>
  <text x="354" y="462" font-family="system-ui, sans-serif" font-size="11" letter-spacing="1.5" fill="#a39c8d">KITCHEN</text>
  <text x="354" y="484" font-family="Georgia, serif" font-size="16" font-weight="600" fill="#15140f">Stoneware Mugs</text>
  <text x="354" y="504" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#15140f">$38</text>

  <!-- Card 3: Lighting -->
  <g filter="url(#t-shadow)"><rect x="612" y="210" width="252" height="300" rx="14" fill="#ffffff"/></g>
  <rect x="612" y="210" width="252" height="220" rx="14" fill="url(#t-light)"/>
  <rect x="612" y="300" width="252" height="130" fill="url(#t-light)"/>
  <path d="M700 320 L760 320 L748 270 L712 270 Z" fill="#d8b765" opacity="0.7"/>
  <rect x="732" y="320" width="8" height="44" fill="#b8954a" opacity="0.7"/>
  <text x="628" y="462" font-family="system-ui, sans-serif" font-size="11" letter-spacing="1.5" fill="#a39c8d">LIGHTING</text>
  <text x="628" y="484" font-family="Georgia, serif" font-size="16" font-weight="600" fill="#15140f">Brass Task Lamp</text>
  <text x="628" y="504" font-family="system-ui, sans-serif" font-size="14" fill="#8a857a"><tspan text-decoration="line-through">$145</tspan> <tspan fill="#b23a2e" font-weight="700">$119</tspan></text>

  <!-- Card 4 (partly behind drawer): Accessories -->
  <g filter="url(#t-shadow)"><rect x="886" y="210" width="252" height="300" rx="14" fill="#ffffff"/></g>
  <rect x="886" y="210" width="252" height="220" rx="14" fill="url(#t-acc)"/>
  <rect x="940" y="280" width="120" height="86" rx="8" fill="#a98fd6" opacity="0.6"/>

  <!-- Star ratings row under heading area for card 1 -->
  <g font-family="system-ui, sans-serif" font-size="13" fill="#e0a32a">
    <text x="220" y="484">★★★★★</text>
  </g>

  <!-- Slide-in cart drawer -->
  <g filter="url(#t-drawer)">
    <rect x="812" y="84" width="388" height="816" fill="#ffffff"/>
  </g>
  <rect x="812" y="84" width="388" height="816" fill="#ffffff"/>
  <text x="844" y="138" font-family="Georgia, serif" font-size="22" font-weight="700" fill="#15140f">Your cart</text>
  <text x="1168" y="138" font-family="system-ui, sans-serif" font-size="26" fill="#8a857a" text-anchor="end">&#215;</text>
  <line x1="812" y1="162" x2="1200" y2="162" stroke="#e7e3da" stroke-width="1.5"/>

  <!-- Drawer line items -->
  <g>
    <rect x="844" y="186" width="60" height="60" rx="8" fill="url(#t-living)"/>
    <text x="920" y="208" font-family="Georgia, serif" font-size="15" font-weight="600" fill="#15140f">Linen Cushion</text>
    <text x="920" y="230" font-family="system-ui, sans-serif" font-size="13" fill="#8a857a">$36.00</text>
    <rect x="920" y="240" width="78" height="26" rx="13" fill="none" stroke="#e7e3da" stroke-width="1.4"/>
    <text x="936" y="258" font-family="system-ui, sans-serif" font-size="14" fill="#54514a">&#8722;</text>
    <text x="959" y="258" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#15140f">1</text>
    <text x="982" y="258" font-family="system-ui, sans-serif" font-size="14" fill="#54514a">+</text>
    <text x="1168" y="210" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#15140f" text-anchor="end">$36.00</text>
  </g>
  <line x1="844" y1="288" x2="1168" y2="288" stroke="#f0ece3" stroke-width="1.4"/>
  <g>
    <rect x="844" y="306" width="60" height="60" rx="8" fill="url(#t-kitchen)"/>
    <text x="920" y="328" font-family="Georgia, serif" font-size="15" font-weight="600" fill="#15140f">Stoneware Mugs</text>
    <text x="920" y="350" font-family="system-ui, sans-serif" font-size="13" fill="#8a857a">$38.00</text>
    <rect x="920" y="360" width="78" height="26" rx="13" fill="none" stroke="#e7e3da" stroke-width="1.4"/>
    <text x="936" y="378" font-family="system-ui, sans-serif" font-size="14" fill="#54514a">&#8722;</text>
    <text x="959" y="378" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#15140f">2</text>
    <text x="982" y="378" font-family="system-ui, sans-serif" font-size="14" fill="#54514a">+</text>
    <text x="1168" y="330" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#15140f" text-anchor="end">$76.00</text>
  </g>

  <!-- Drawer summary -->
  <line x1="812" y1="690" x2="1200" y2="690" stroke="#e7e3da" stroke-width="1.5"/>
  <text x="844" y="730" font-family="system-ui, sans-serif" font-size="16" fill="#54514a">Subtotal</text>
  <text x="1168" y="730" font-family="Georgia, serif" font-size="22" font-weight="700" fill="#15140f" text-anchor="end">$112.00</text>
  <text x="844" y="756" font-family="system-ui, sans-serif" font-size="12" fill="#a39c8d">Shipping &amp; taxes calculated at checkout.</text>
  <rect x="844" y="780" width="324" height="48" rx="24" fill="none" stroke="#15140f" stroke-width="1.6"/>
  <text x="1006" y="810" font-family="system-ui, sans-serif" font-size="15" font-weight="600" fill="#15140f" text-anchor="middle">View cart</text>
  <rect x="844" y="838" width="324" height="48" rx="24" fill="#15140f"/>
  <text x="1006" y="868" font-family="system-ui, sans-serif" font-size="15" font-weight="600" fill="#ffffff" text-anchor="middle">Checkout</text>
</svg>
